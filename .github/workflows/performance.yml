name: performance-accessibility

on:
  pull_request:
    paths:
      - "src/**"
      - "public/**"
      - "scripts/check-performance-budgets.mjs"
      - "package.json"
      - "package-lock.json"
      - "next.config.ts"
      - "lighthouserc*.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  budgets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          BACKEND_URL: https://api-nox.cloud-it.com.ar
      - run: npm run perf:budgets
      - name: Lighthouse CI — mobile
        run: npm run perf:lighthouse:mobile
      - name: Lighthouse CI — desktop
        run: npm run perf:lighthouse:desktop
