name: performance-accessibility

on:
  pull_request:
    paths:
      - "src/**"
      - "public/**"
      - "config/media-assets.json"
      - "scripts/check-performance-budgets.mjs"
      - "package.json"
      - "package-lock.json"
      - "next.config.ts"
      - "lighthouserc*.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  budgets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          BACKEND_URL: https://api-nox.cloud-it.com.ar
          NEXT_PUBLIC_MEDIA_PUBLIC_URL: https://media-dev-nox.cloud-it.com.ar
          NEXT_PUBLIC_MEDIA_TRANSFORM_URL: https://media-dev-nox.cloud-it.com.ar
          NEXT_PUBLIC_MEDIA_TENANT: nox
      - run: npm run test:media
      - run: npm run perf:budgets
      - name: Lighthouse CI — mobile
        run: npm run perf:lighthouse:mobile
      - name: Lighthouse CI — desktop
        run: npm run perf:lighthouse:desktop
