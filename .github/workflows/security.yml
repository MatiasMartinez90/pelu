name: security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  dependencies:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: backend
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nox_test
      TEST_RABBITMQ_URL: amqp://nox_test:nox_test@localhost:5672/
      PGPASSWORD: postgres
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nox_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nox_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      rabbitmq:
        image: rabbitmq:3.13-management
        env:
          RABBITMQ_DEFAULT_USER: nox_test
          RABBITMQ_DEFAULT_PASS: nox_test
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install --require-hashes -r backend/requirements-dev.lock
      - name: Aplicar migraciones en PostgreSQL descartable
        run: |
          for file in backend/db/migrations/*.sql; do
            awk '/-- migrate:down/{exit} {print}' "$file" |
              psql -v ON_ERROR_STOP=1 -h localhost -U postgres -d nox_test
          done
      - run: ruff check backend/src backend/tests
      - run: pytest backend/tests
      - run: pip-audit -r backend/requirements.lock

  code-and-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.70.0
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"
