name: build-deploy

on:
  workflow_dispatch:
  push:
    branches: [main, dev]
    paths-ignore:
      - "README.md"

permissions:
  contents: read
  packages: write

env:
  IMAGE_FRONT: ghcr.io/matiasmartinez90/nox-barber
  IMAGE_BACKEND: ghcr.io/matiasmartinez90/nox-backend

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      front: ${{ steps.filter.outputs.front }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            front:
              - "src/**"
              - "public/**"
              - "config/media-assets.json"
              - "package.json"
              - "package-lock.json"
              - "next.config.ts"
              - "Dockerfile"
              - ".dockerignore"
            backend:
              - "backend/**"

  build-front:
    needs: changes
    if: needs.changes.outputs.front == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Tag corto
        id: tag
        run: echo "sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push front (amd64)
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_FRONT }}:${{ steps.tag.outputs.sha }}
            ${{ env.IMAGE_FRONT }}:${{ github.ref_name == 'main' && 'latest' || 'dev-latest' }}
          cache-from: type=gha,scope=front
          cache-to: type=gha,mode=max,scope=front
          build-args: |
            SITE_URL=${{ github.ref_name == 'dev' && 'https://dev-nox.cloud-it.com.ar' || 'https://nox.cloud-it.com.ar' }}
            SITE_INDEXABLE=${{ github.ref_name == 'main' && 'true' || 'false' }}
            NEXT_PUBLIC_MEDIA_PUBLIC_URL=${{ github.ref_name == 'dev' && vars.MEDIA_PUBLIC_URL_DEV || vars.MEDIA_PUBLIC_URL_PROD }}
            NEXT_PUBLIC_MEDIA_TRANSFORM_URL=${{ github.ref_name == 'dev' && vars.MEDIA_TRANSFORM_URL_DEV || vars.MEDIA_TRANSFORM_URL_PROD }}
            NEXT_PUBLIC_MEDIA_TENANT=${{ github.ref_name == 'dev' && vars.MEDIA_TENANT_DEV || vars.MEDIA_TENANT_PROD }}

      - name: Actualizar manifest en repo GitOps
        env:
          GH_TOKEN: ${{ secrets.INFRA_REPO_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then echo "Sin INFRA_REPO_TOKEN — salteo el bump."; exit 0; fi
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/MatiasMartinez90/agents-hetzner-k3s.git" infra
          cd infra
          if [ "$GITHUB_REF_NAME" = "dev" ]; then
            manifests="manifests-contabo/nox-dev/nox-web.yaml"
            environment="dev"
          else
            manifests="manifests-contabo/nox-barber.yaml manifests-contabo/nox-demo/nox-web.yaml"
            environment="production-demo"
          fi
          for manifest in $manifests; do
            test -f "$manifest"
            sed -i -E "s#image: ghcr\.io/matiasmartinez90/nox-barber([:@]).*#image: ghcr.io/matiasmartinez90/nox-barber@${{ steps.build.outputs.digest }}#" "$manifest"
          done
          if git diff --quiet; then echo "sin cambios en el tag"; exit 0; fi
          git config user.name "nox-ci"
          git config user.email "ci@noxbarber.local"
          git commit -am "ci(nox-${environment}): imagen front ${{ steps.tag.outputs.sha }}"
          git push

  build-backend:
    # needs build-front con !cancelled(): serializa los push al repo GitOps
    # (si corrieran en paralelo, el segundo push fallaría por non-fast-forward).
    needs: [changes, build-front]
    if: >
      !cancelled() &&
      (needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch') &&
      (needs.build-front.result == 'success' || needs.build-front.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Tag corto
        id: tag
        run: echo "sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend (amd64)
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:${{ steps.tag.outputs.sha }}
            ${{ env.IMAGE_BACKEND }}:${{ github.ref_name == 'main' && 'latest' || 'dev-latest' }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Actualizar manifest en repo GitOps
        env:
          GH_TOKEN: ${{ secrets.INFRA_REPO_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then echo "Sin INFRA_REPO_TOKEN — salteo el bump."; exit 0; fi
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/MatiasMartinez90/agents-hetzner-k3s.git" infra
          cd infra
          if [ "$GITHUB_REF_NAME" = "dev" ]; then
            manifests="manifests-contabo/nox-dev/nox-backend.yaml"
            environment="dev"
          else
            manifests="manifests-contabo/nox-backend.yaml manifests-contabo/nox-demo/nox-backend.yaml"
            environment="production-demo"
          fi
          for manifest in $manifests; do test -f "$manifest"; done
          for i in 1 2 3; do
            for manifest in $manifests; do
              sed -i -E "s#image: ghcr\.io/matiasmartinez90/nox-backend([:@]).*#image: ghcr.io/matiasmartinez90/nox-backend@${{ steps.build.outputs.digest }}#" "$manifest"
            done
            if git diff --quiet; then echo "sin cambios en el tag"; exit 0; fi
            git config user.name "nox-ci"
            git config user.email "ci@noxbarber.local"
            git commit -am "ci(nox-${environment}): imagen backend ${{ steps.tag.outputs.sha }}"
            git push && exit 0
            git pull --rebase
          done
          exit 1
