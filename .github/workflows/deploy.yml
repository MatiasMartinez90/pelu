name: build-deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - ".github/**"

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/matiasmartinez90/nox-barber

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tag corto
        id: tag
        run: echo "sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Bump del tag en el repo GitOps -> ArgoCD deploya solo.
      # Requiere el secret INFRA_REPO_TOKEN (PAT fine-grained con contents:write sobre agents-hetzner-k3s).
      - name: Actualizar manifest en repo GitOps
        if: ${{ secrets.INFRA_REPO_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ secrets.INFRA_REPO_TOKEN }}
        run: |
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/MatiasMartinez90/agents-hetzner-k3s.git" infra
          cd infra
          sed -i -E "s#(image: ghcr\.io/matiasmartinez90/nox-barber:).*#\1${{ steps.tag.outputs.sha }}#" manifests-contabo/nox-barber.yaml
          if git diff --quiet; then echo "sin cambios en el tag"; exit 0; fi
          git config user.name "nox-ci"
          git config user.email "ci@noxbarber.local"
          git commit -am "ci(nox): imagen ${{ steps.tag.outputs.sha }}"
          git push
